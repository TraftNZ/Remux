name: remux
description: "SSH terminal app for remote compute management"
publish_to: 'none'
version: 1.0.0+19

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dartssh2: ^2.9.0
  xterm: ^4.0.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.4
  uuid: ^4.5.1
  json_annotation: ^4.9.0
  flutter_foreground_task: ^9.2.2
  marionette_flutter: ^0.4.0
  flutter_pty: ^0.4.2
  mosh_dart:
    git:
      url: https://github.com/unixshells/mosh-dart.git

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
